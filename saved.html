<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saved Articles · Aldernews</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF6EC;
    --fallen-leaf: #E8C46A;
    --amber-bark: #C47C2B;
    --rich-soil: #6B3D14;
    --evergreen: #3E6B3A;
    --night-canopy: #1C3320;
    --pro-ruling-bg: #FDF3E3;
    --pro-ruling-text: #6B3D14;
    --pro-opposition-bg: #EAF2E9;
    --pro-opposition-text: #1C3320;
    --text-primary: #1C1208;
    --text-secondary: #6B5A45;
    --text-muted: #9C8A74;
    --border: rgba(107,61,20,0.12);
    --border-strong: rgba(107,61,20,0.25);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-primary); min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--night-canopy); padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; border-bottom: 2px solid var(--fallen-leaf);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
    color: var(--fallen-leaf); cursor: pointer; letter-spacing: -0.3px; text-decoration: none;
  }
  .nav-logo span { color: var(--cream); font-weight: 400; }
  .nav-links { display: flex; gap: 4px; }
  .nav-link {
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    color: rgba(251,246,236,0.7); cursor: pointer; border: none; background: none;
    transition: all 0.2s; font-family: 'DM Sans', sans-serif; text-decoration: none;
    display: inline-flex; align-items: center;
  }
  .nav-link:hover { color: var(--fallen-leaf); background: rgba(232,196,106,0.1); }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .back-btn {
    padding: 7px 16px; border-radius: 6px;
    border: 1px solid rgba(232,196,106,0.3); background: transparent;
    color: rgba(251,246,236,0.7); font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { color: var(--fallen-leaf); border-color: var(--fallen-leaf); }

  .main-layout { max-width: 860px; margin: 0 auto; padding: 3rem 2rem; }

  .page-header {
    margin-bottom: 2rem; padding-bottom: 1.5rem;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .page-header h1 {
    font-family: 'Playfair Display', serif; font-size: 32px;
    font-weight: 700; color: var(--night-canopy); margin-bottom: 4px;
  }
  .page-header p { font-size: 14px; color: var(--text-secondary); }
  .header-actions { display: flex; gap: 8px; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: white; color: var(--text-secondary);
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--night-canopy); color: var(--fallen-leaf); border-color: var(--night-canopy); }
  .filter-btn:hover:not(.active) { border-color: var(--amber-bark); color: var(--amber-bark); }

  .tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 9px;
    border-radius: 4px; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .tag-ruling { background: var(--pro-ruling-bg); color: var(--pro-ruling-text); }
  .tag-opposition { background: var(--pro-opposition-bg); color: var(--pro-opposition-text); }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; }
  .tag-ruling .tag-dot { background: var(--amber-bark); }
  .tag-opposition .tag-dot { background: var(--evergreen); }

  /* SAVED ARTICLES LIST */
  .saved-list { display: flex; flex-direction: column; gap: 0; }
  .saved-item {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 1.25rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .saved-item:hover { border-color: var(--border-strong); box-shadow: 0 2px 12px rgba(107,61,20,0.06); }
  .saved-item-index {
    font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
    color: var(--border); line-height: 1; flex-shrink: 0; width: 36px; text-align: right;
    padding-top: 2px;
  }
  .saved-item-body { flex: 1; min-width: 0; }
  .saved-item-tag { margin-bottom: 8px; }
  .saved-item-title {
    font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600;
    color: var(--night-canopy); line-height: 1.4; margin-bottom: 10px;
    cursor: pointer;
  }
  .saved-item-title:hover { color: var(--amber-bark); }
  .saved-item-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text-muted);
  }
  .saved-item-date { color: var(--text-muted); font-size: 12px; }
  .remove-btn {
    position: absolute; top: 1rem; right: 1rem;
    padding: 5px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 500;
    border: 1px solid var(--border); background: white; color: var(--text-muted);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s; display: flex; align-items: center; gap: 4px;
    opacity: 0;
  }
  .saved-item:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { border-color: #FECACA; color: #B91C1C; background: #FEF2F2; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 5rem 2rem;
  }
  .empty-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: white; border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem; font-size: 28px;
  }
  .empty-state h3 {
    font-family: 'Playfair Display', serif; font-size: 22px;
    color: var(--night-canopy); margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 340px; margin: 0 auto 1.5rem; }
  .empty-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px; border-radius: 8px;
    background: var(--night-canopy); color: var(--fallen-leaf);
    font-size: 14px; font-weight: 500; text-decoration: none;
    font-family: 'DM Sans', sans-serif; transition: background 0.2s;
  }
  .empty-cta:hover { background: var(--rich-soil); }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 1.5rem; background: white;
    border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
  }
  .stat-item { display: flex; flex-direction: column; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--night-canopy); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.3px; }
  .stat-divider { width: 1px; background: var(--border); }

  /* SORT BAR */
  .sort-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .sort-label { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .sort-select {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: white; font-size: 12px; color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
  }
  .sort-select:focus { border-color: var(--amber-bark); }

  /* CLEAR ALL */
  .clear-all-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #FECACA;
    background: white; color: #B91C1C; font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .clear-all-btn:hover { background: #FEF2F2; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Alder<span>news</span></a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Articles</a>
    <a class="nav-link" href="index.html">Videos</a>
    <a class="nav-link" href="index.html">Global</a>
  </div>
  <div class="nav-right">
    <a class="back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to feed
    </a>
  </div>
</nav>

<div class="main-layout">
  <div class="page-header">
    <div>
      <h1>Saved articles</h1>
      <p id="subtitle">Your personal reading list</p>
    </div>
    <div class="header-actions">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('ruling', this)">Pro-ruling</button>
      <button class="filter-btn" onclick="setFilter('opposition', this)">Pro-opposition</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat-item">
      <span class="stat-value" id="stat-total">0</span>
      <span class="stat-label">Total saved</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="stat-ruling">0</span>
      <span class="stat-label">Pro-ruling</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-value" id="stat-opp">0</span>
      <span class="stat-label">Pro-opposition</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item" style="margin-left:auto;justify-content:center;">
      <button class="clear-all-btn" onclick="clearAll()">Clear all saved</button>
    </div>
  </div>

  <!-- SORT -->
  <div class="sort-bar" id="sort-bar" style="display:none">
    <span class="sort-label">Reading list</span>
    <select class="sort-select" id="sort-select" onchange="renderArticles()">
      <option value="newest">Newest saved first</option>
      <option value="oldest">Oldest saved first</option>
    </select>
  </div>

  <!-- LIST -->
  <div class="saved-list" id="saved-list"></div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="empty-state" style="display:none">
    <div class="empty-icon">🔖</div>
    <h3>Your reading list is empty</h3>
    <p>Hit the Save button on any article to add it here. Build your own balanced archive.</p>
    <a class="empty-cta" href="index.html">Browse articles</a>
  </div>
</div>

<script>
  let currentFilter = 'all';

  function getSaved() {
    try { return JSON.parse(localStorage.getItem('aldernews_saved') || '[]'); } catch(e) { return []; }
  }
  function setSaved(arr) { localStorage.setItem('aldernews_saved', JSON.stringify(arr)); }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderArticles();
  }

  function renderArticles() {
    const all = getSaved();
    const sort = document.getElementById('sort-select').value;
    let articles = currentFilter === 'all' ? all : all.filter(a => a.type === currentFilter);
    if (sort === 'oldest') articles = [...articles].reverse();

    const list = document.getElementById('saved-list');
    const emptyState = document.getElementById('empty-state');
    const statsBar = document.getElementById('stats-bar');
    const sortBar = document.getElementById('sort-bar');
    const subtitle = document.getElementById('subtitle');

    // Update stats
    const ruling = all.filter(a => a.type === 'ruling').length;
    const opp = all.filter(a => a.type === 'opposition').length;
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-ruling').textContent = ruling;
    document.getElementById('stat-opp').textContent = opp;
    subtitle.textContent = all.length === 1 ? '1 article saved' : `${all.length} articles saved`;

    if (all.length === 0) {
      list.innerHTML = '';
      emptyState.style.display = 'block';
      statsBar.style.display = 'none';
      sortBar.style.display = 'none';
      return;
    }

    emptyState.style.display = 'none';
    statsBar.style.display = 'flex';
    sortBar.style.display = 'flex';

    if (articles.length === 0) {
      list.innerHTML = `<div style="text-align:center;padding:3rem 2rem;color:var(--text-muted);font-size:14px;">No ${currentFilter === 'ruling' ? 'pro-ruling' : 'pro-opposition'} articles saved yet.</div>`;
      return;
    }

    list.innerHTML = articles.map((a, i) => {
      const isRuling = a.type === 'ruling';
      const tagClass = isRuling ? 'tag-ruling' : 'tag-opposition';
      const tagLabel = isRuling ? 'Pro-ruling' : 'Pro-opposition';
      return `
      <div class="saved-item" id="item-${a.id}">
        <div class="saved-item-index">${String(i+1).padStart(2,'0')}</div>
        <div class="saved-item-body">
          <div class="saved-item-tag">
            <span class="tag ${tagClass}"><span class="tag-dot"></span>${tagLabel}</span>
          </div>
          <div class="saved-item-title">${escapeHtml(a.title)}</div>
          <div class="saved-item-meta">
            <span>${escapeHtml(a.author)}</span>
            <span>·</span>
            <span>${escapeHtml(a.readTime)}</span>
            <span>·</span>
            <span class="saved-item-date">Saved ${formatDate(a.savedAt)}</span>
          </div>
        </div>
        <button class="remove-btn" onclick="removeArticle('${a.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Remove
        </button>
      </div>`;
    }).join('');
  }

  function removeArticle(id) {
    const saved = getSaved().filter(a => a.id !== id);
    setSaved(saved);
    // Also sync with index page if open
    const el = document.getElementById('item-' + id);
    if (el) {
      el.style.opacity = '0'; el.style.transform = 'translateX(10px)'; el.style.transition = 'all 0.25s';
      setTimeout(() => renderArticles(), 260);
    }
  }

  function clearAll() {
    if (!confirm('Remove all saved articles? This cannot be undone.')) return;
    setSaved([]);
    renderArticles();
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  renderArticles();
</script>
</body>
</html>
